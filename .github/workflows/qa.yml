name: Enterprise QA Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/smartnivad_ci' }}

jobs:
  qa:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit msedge

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Playwright E2E
        run: npm run test:e2e:ci

      - name: Accessibility
        run: npm run test:a11y

      - name: Visual regression
        run: npx playwright test tests/visual --project=responsive-390 --project=responsive-768 --project=responsive-1440 --update-snapshots=missing

      - name: Lighthouse
        run: npm run lhci

      - name: Security audit
        run: npm run security:audit

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enterprise-qa-reports
          path: |
            coverage/
            reports/
            artifacts/
            test-results/
          retention-days: 14
