name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/smartnivad_ci' }}

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Enforce Bundle Budgets
        run: node scripts/check-bundle-size.js

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  browser:
    name: Browser QA
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit msedge

      - name: Build
        run: npm run build

      - name: End-to-end tests
        run: npm run test:e2e:ci

      - name: Accessibility tests
        run: npm run test:a11y

      - name: Visual regression tests
        run: npx playwright test tests/visual --project=responsive-390 --project=responsive-768 --project=responsive-1440 --update-snapshots=missing

      - name: Upload Playwright reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-reports
          path: |
            reports/playwright/
            artifacts/playwright/
            test-results/
          retention-days: 14
