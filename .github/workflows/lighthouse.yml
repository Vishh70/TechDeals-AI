name: Lighthouse

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/smartnivad_ci' }}

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse budgets
        run: npm run lhci

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse
          path: reports/lighthouse/
          retention-days: 14
